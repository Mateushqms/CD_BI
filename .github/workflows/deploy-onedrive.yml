name: Deploy PBIP to OneDrive

on:
  push:
    branches:
      - main
    paths:
      - 'PBIP/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Update CSV connections to OneDrive local path
        env:
          ONEDRIVE_LOCAL_PATH: ${{ vars.ONEDRIVE_LOCAL_PATH }}
        run: python .github/scripts/update_connections.py

      - name: Upload PBIP to OneDrive
        env:
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          ONEDRIVE_REFRESH_TOKEN: ${{ secrets.ONEDRIVE_REFRESH_TOKEN }}
          ONEDRIVE_FOLDER_PATH: ${{ vars.ONEDRIVE_FOLDER_PATH || 'PBIP_Deploy' }}
        run: python .github/scripts/upload_personal.py
